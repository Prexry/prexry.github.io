<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://arc.io/widget.min.js#zF5c1y2k"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booter</title>
    <style>
        body {
            background-color: #222;
            color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .booter-box {
            background-color: #333;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 350px;
            padding: 20px;
            border-radius: 5px;
        }
        .booter-button {
            display: block;
            width: 100%;
            text-align: center;
            background-color: #444;
            color: #f0f0f0;
            padding: 10px 0;
            border-radius: 3px;
            text-decoration: none;
        }
        .booter-button:hover {
            background-color: #555;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="../" title="Back" class="back-button" style="position:fixed;top:20px;left:20px;padding:10px 20px;background-color:#333;color:#fff;text-decoration:none;border-radius:5px;transition:background-color 0.3s ease; z-index: 999;">⬅</a>
    <div class="booter-box">
        <a href="javascript:void(0)" onclick="openCCSDPopup()" class="booter-button">Precision Client</a>
        <a href="javascript:void(0)" onclick="openResentPopup()" class="booter-button">Resent Client</a>
    </div>

    <script>
        function openCCSDPopup() {
            var popupWindow = window.open('about:blank', 'Eaglercraft', 'width=' + screen.availWidth + ',height=' + screen.availHeight + ',top=0,left=0,toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=no');
            if (popupWindow) {
                var iframe = document.createElement('iframe');
                iframe.src = 'https://weare.clarkcounty.shop/int/mine/prec.html';
                iframe.style.border = 'none';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                popupWindow.document.body.appendChild(iframe);
            } else {
                alert("Popup blocked. Please allow popups for this site.");
            }
        }

        function openResentPopup() {
            var popupWindow = window.open('about:blank', 'Eaglercraft', 'width=' + screen.availWidth + ',height=' + screen.availHeight + ',top=0,left=0,toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=no');
            if (popupWindow) {
                var iframe = document.createElement('iframe');
                iframe.src = 'https://weare.clarkcounty.shop/int/mine/Resent/index.html';
                iframe.style.border = 'none';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                popupWindow.document.body.appendChild(iframe);
            } else {
                alert("Popup blocked. Please allow popups for this site.");
            }
        }
    </script>
</body>
</html>
