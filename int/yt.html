<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="icon" type="image/x-icon" href="../img/dshboard.ico" />
  <link rel="stylesheet" href="design/loading.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      position: relative;
    }
    .button-bar {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      z-index: 999;
    }
    .back-button, .refresh-button {
      padding: 10px;
      background-color: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 50%;
      transition: background-color 0.3s ease;
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .back-button:hover, .refresh-button:hover {
      background-color: #555;
    }
    .back-button::before, .refresh-button::before {
      content: '⬅';
    }
    .refresh-button::before {
      content: '↻';
    }
    .msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    #myIframe {
      display: none;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="button-bar">
    <a href="../" title="Back" class="back-button"></a>
    <!--<a href="#" title="Refresh" class="refresh-button" onclick="refreshIframe()"></a>-->
  </div>

  <div class="msg">
    <div class="lds-dual-ring"></div>
    <p class="info" id="loading-message">Loading..</p>
  </div>

  <iframe id="myIframe" src="https://search.clarkcounty.shop/#youtube"></iframe>

  <script>
    var messages = [
      "This might take a while, maybe grab a drink?",
      "You still there?",
      "Wake up!",
      "Maybe the server's down.."
    ];
    var currentIndex = 0;
    var originalMessage = "Loading..";
    var myIframe = document.getElementById('myIframe');
    var loadingMessage = document.getElementById('loading-message');

    setInterval(function() {
      if (currentIndex === 0) {
        loadingMessage.innerText = originalMessage;
      } else {
        loadingMessage.innerText = messages[currentIndex - 1] + ' (' + currentIndex + '/' + messages.length + ')';
      }
      currentIndex = (currentIndex + 1) % (messages.length + 1);
    }, 3000);

    myIframe.onload = function() {
      var msg = document.querySelector('.msg');
      msg.parentNode.removeChild(msg);
      myIframe.style.display = 'block';
    };

    function refreshIframe() {
      var iframe = document.getElementById('myIframe');
      iframe.src = iframe.src;
    }
  </script>
</body>
</html>
